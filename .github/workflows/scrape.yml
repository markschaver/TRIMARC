name: Scrape TRIMARC feed

on:
  schedule:
    # Every 15 minutes. GitHub may delay scheduled runs under load.
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # allow manual runs from the Actions tab

# Let the built-in GITHUB_TOKEN push the data commit back to the repo.
permissions:
  contents: write

# Don't let a slow run overlap the next scheduled one.
concurrency:
  group: scrape-trimarc
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Fetch feed and update CSV
        id: scrape
        run: |
          python scrape.py
          if [ -n "$(git status --porcelain data/)" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Regenerate geojson (only when data changed)
        if: steps.scrape.outputs.changed == 'true'
        continue-on-error: true # a geocoding hiccup must never block data collection
        run: python geocode.py

      - name: Commit and push if anything changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update TRIMARC feed data: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            git push
          fi
